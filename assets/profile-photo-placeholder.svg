  <path d="M54 92 H320" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>
  <path d="M54 122 H242" stroke="url(#line)" stroke-width="8" stroke-linecap="round" opacity="0.82"/>
  <text x="360" y="802" text-anchor="middle" fill="#f5f7fb" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Profile Photo</text>
  <text x="360" y="838" text-anchor="middle" fill="#a9b3c1" font-family="Inter, Arial, sans-serif" font-size="20">Replace this file with your image</text>
</svg>
