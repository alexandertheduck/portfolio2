<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">Profile photo placeholder</title>
  <desc id="desc">A clean placeholder image for Alex Sugiarto's professional profile photo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#10151b"/>
      <stop offset="0.55" stop-color="#263241"/>
      <stop offset="1" stop-color="#ff3d2e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop stop-color="#36d399"/>
      <stop offset="1" stop-color="#5ab8ff"/>
    </linearGradient>
